<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beluga 3: Family Edition</title>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
      #tabs {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    padding: 20px 10px;
    background: #ffffff; /* Чистий фон для контрасту */
    border-bottom: 2px solid #e0e0e0;
    margin-bottom: 20px;
}

.tab-btn {
    width: 180px;
    padding: 12px 20px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 10px;
    transition: all 0.3s ease; /* Плавність ефектів */
    
    /* Базовий стан: легкий бордер і фон */
    background: #f8f9fa;
    border: 1px solid #d1d5db;
    color: #4b5563;
}

/* Ефект при наведенні (Hover) */
.tab-btn:hover {
    background: #e5e7eb;
    border-color: #9ca3af;
    transform: translateY(-2px); /* Кнопка трохи "піднімається" */
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

/* Стан активної вкладки (коли ми на ній) */
.tab-btn.active {
    background: #2196F3; /* Твій основний синій колір */
    color: white;
    border-color: #1976D2;
    box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
}
        /* Стиль логотипу */
.game-logo-pc {
    display: none; /* Спочатку ховаємо для мобільних */
    width: 262px;
    height: 46px;
    object-fit: contain;
}

/* Тільки для екранів більше 768 пікселів (ПК) */
@media (min-width: 768px) {
    .game-logo-pc {
        display: block; /* Показуємо логотип */
    }
}

/* Для мобільних пристроїв: щоб кнопки не злипалися, якщо лого зникне */
@media (max-width: 767px) {
    .tab-btn {
        width: 45%; /* Кнопки займають майже половину екрана */
    }
}
        .tab-btn.active { background: #2196F3; color: white; box-shadow: 0 4px 10px rgba(33, 150, 243, 0.3); }

        .view { display: none; width: 98%; max-width: 1600px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .game-layout { display: flex; justify-content: center; align-items: flex-start; gap: 15px; width: 100%; }

        #gridWrapper { overflow: auto; background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 4px solid #fff; }
        #grid { display: grid; grid-template-columns: repeat(18, 55px); background: #ccc; }
        
        .cell { 
            width: 55px; height: 55px; border: 1px solid rgba(0,0,0,0.05); position: relative; 
            background-image: url('img/ground.png'); background-size: cover; cursor: pointer; 
        }
/* Контейнер для всього ігрового процесу */
.game-layout { 
    display: flex; 
    flex-direction: row; 
    justify-content: center; 
    align-items: flex-start;
    gap: 15px; 
    width: 100%; 
}

/* Обгортка поля для прокрутки */
#gridWrapper { 
    overflow-x: auto; 
    background: #fff; 
    border-radius: 12px; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    -webkit-overflow-scrolling: touch; /* плавна прокрутка на iOS */
}

/* Поле за замовчуванням (ПК версія) */
#grid { 
    display: grid; 
    grid-template-columns: repeat(18, 55px); /* На ПК 55px */
    background: #ccc; 
    width: fit-content;
}

.cell { 
    width: 55px; height: 55px; 
    position: relative; 
    background-size: cover;
}
        .divider { position: relative; }
        .divider::after {
            content: '';
            position: absolute;
            top: 0; right: -2px; bottom: 0;
            width: 4px;
            border-right: 3px dashed rgba(0, 0, 0, 0.7);
            z-index: 10;
            pointer-events: none;
        }

        .unitImg { width: 100%; height: 100%; object-fit: contain; z-index: 2; position: relative; pointer-events: none; }
        .unitP1 { filter: drop-shadow(0 0 4px #2196F3); }
        .unitP2 { filter: drop-shadow(0 0 4px #f44336); }
        .hp { position: absolute; bottom: 2px; right: 2px; font-size: 11px; color: white; background: rgba(0,0,0,0.7); padding: 1px 4px; border-radius: 3px; z-index: 3; }
        .mp { position: absolute; top: 2px; left: 2px; font-size: 11px; background: #FFD700; color: #000; padding: 1px 4px; border-radius: 3px; font-weight: bold; z-index: 3; }
        
        .move { background: rgba(76, 175, 80, 0.4); }
        .selected { outline: 3px solid #000; z-index: 5; }
        .attackBorder { outline: 3px solid #f44336; animation: blink 1s infinite; }
        .attackBorder:hover::after { 
    content: '⚔️'; 
    position: absolute; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); /* Центрування по обох осях */
    font-size: 30px; 
    z-index: 10; 
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1; /* Прибирає зайве місце знизу емодзі */
}

/* Окремо для цілителя (ПК) */
.attackBorder.healer-target:hover::after { 
    content: '➕' !important; 
}

        @keyframes hitEffect { 0% { transform: scale(1); filter: brightness(3); } 50% { transform: scale(1.3); filter: hue-rotate(90deg); } 100% { transform: scale(1); filter: brightness(1); } }
        .hit { animation: hitEffect 0.5s ease-out; z-index: 20; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .panel { width: 200px; flex-shrink: 0; }
        .card { background: white; padding: 12px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        /* Базова картка юніта */
.shopCard { 
    position: relative; 
    padding: 0 !important; /* Прибираємо відступи, щоб фото було від краю до краю */
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #fff;
    border: 1px solid #ddd;
    margin-bottom: 12px;
}

/* Контейнер для зображення */
.unit-preview {
    position: relative;
    width: 100%;
    height: 200px; /* Фіксована висота як ти просив */
    background: #fdfdfd;
}

.shopImg { 
    width: 100% !important; 
    height: 100% !important; 
    object-fit: contain; 
    display: block;
    padding: 5px;
    box-sizing: border-box;
}

.stats-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.6); /* Трохи світліше, щоб не перекривати картинку надто сильно */
    color: #000000;
    padding: 6px 2px;
    text-align: center;
    font-size: 0.9em; /* Збільшено розмір шрифту */
    letter-spacing: 0.5px;
    pointer-events: none;
    z-index: 5;
}

/* Нижня плашка тільки для назви */
.name-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(50, 50, 15, 0.75);
    color: white;
    padding: 5px;
    text-align: center;
    font-weight: bold;
    font-size: 0.85em;
    pointer-events: none;
    z-index: 5;
}

/* Видаляємо старий .unit-overlay, бо він більше не потрібен */
.unit-overlay { display: none; }

.unit-overlay b { display: block; font-size: 0.9em; margin-bottom: 2px; }
.unit-overlay div { font-size: 0.75em; letter-spacing: 0.5px; }

/* Кнопка з ціною всередині */
.buyBtn { 
    width: 100%; 
    padding: 10px; 
    cursor: pointer; 
    border: none; 
    border-radius: 0; /* Рівна кнопка внизу картки */
    background: #4CAF50; 
    color: white; 
    font-weight: bold;
    font-size: 0.9em;
}

.buyBtn:disabled { background: #ccc; cursor: not-allowed; }
.buyBtn:hover:not(:disabled) { background: #45a049; }

        .race-editor { background: white; padding: 25px; border-radius: 15px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .unit-form { border: 1px solid #eee; padding: 15px; margin: 15px 0; border-radius: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: #fafafa; }
        .delete-btn { background: #ff5252; color: white; border: none; padding: 8px; cursor: pointer; border-radius: 6px; }

        #menu { text-align: center; background: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
       @media (max-width: 900px) {
    /* Робимо колонку: Магазин 1 -> Поле -> Магазин 2 */
    .game-layout { 
        flex-direction: column !important; 
        align-items: center !important; 
        gap: 5px !important;
    }
           .attackBorder:hover::after {
        font-size: 22px !important; /* Зменшуємо іконку для маленької клітинки */
    }


    /* Магазини: стають горизонтальними стрічками */
    .panel { 
        width: 100% !important; 
        display: flex !important; 
        flex-direction: row !important;
        overflow-x: auto !important; 
        gap: 8px; 
        padding: 5px;
        background: #e0e0e0;
        box-sizing: border-box;
        height: 240px;
    }

    /* Картки в магазині: 3 штуки мають поміщатися в екран */
    .shopCard { 
        min-width: 110px; 
        margin-bottom: 0 !important; 
        padding: 5px !important;
        flex-shrink: 0;
    }

    .shopImg { height: 150px !important; }

    /* Поле: клітинка 35px та горизонтальна прокрутка */
    #gridWrapper { 
        width: 100vw; 
        overflow-x: auto !important; 
        -webkit-overflow-scrolling: touch;
        border: 2px solid #fff;
    }

    #grid { 
        grid-template-columns: repeat(18, 35px) !important; 
        width: fit-content;
    }

    .cell { 
        width: 35px !important; 
        height: 35px !important; 
    }

           /* Центруємо емоджі гір та міст у маленьких клітинках */
    .cell span {
        left: 50% !important;
        top: 50% !important;
        transform: translate(-50%, -50%) !important; /* Магія центрування */
        font-size: 20px !important; /* Трохи зменшуємо, щоб емоджі не тиснули на краї */
        margin: 0 !important;
    }

    /* Коригуємо розміри іконок під 35px */
    .hp, .mp { font-size: 7px !important; padding: 0 1px !important; }
    .unitImg { transform: scale(0.9); }

    /* ПОРЯДОК: Магазин P1 зверху, Поле посередині, Магазин P2 знизу */
    #leftPanel { order: 1; } 
    
    /* Це вибирає центральний div з полем */
    .game-layout > div:not(.panel) { 
        order: 2; 
        width: 100%; 
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    
    #rightPanel { order: 3; } 
           /* --- СТИЛІ ДЛЯ РЕДАКТОРА (МОБІЛЬНА ВЕРСІЯ) --- */

    .race-editor { 
        padding: 10px !important; 
    }

    /* Блок з ключем синхронізації */
    .race-editor div[style*="background: #e3f2fd"] {
        flex-direction: column !important; /* Елементи в стовпчик */
        align-items: stretch !important;
        gap: 10px !important;
    }

    .race-editor #syncKey {
        width: 100% !important; /* Поле на всю ширину */
        box-sizing: border-box;
    }

    /* Заголовок раси: Назва + Кнопка видалення */
    .race-editor .card div[style*="display:flex"] {
        flex-direction: column !important;
        gap: 10px;
        align-items: flex-start !important;
    }

    .race-editor .card input[type="text"][style*="width: 250px"] {
        width: 100% !important; /* Назва раси на всю ширину */
        border: 1px solid #ddd !important;
        background: #fff !important;
    }

    /* Форма юніта: робимо поля в 2 стовпчики, щоб було компактно */
    .unit-form {
        grid-template-columns: 1fr 1fr !important; 
        padding: 10px !important;
        gap: 8px !important;
    }

    /* Поле з посиланням на картинку та кнопка видалення юніта */
    .unit-form div[style*="grid-column: span 2"],
    .unit-form div[style*="display: flex; align-items: flex-end"] {
        grid-column: span 2 !important;
    }

    .unit-form input {
        width: 100% !important;
        box-sizing: border-box;
        font-size: 14px !important;
    }

    /* Кнопки в редакторі */
    .race-editor button {
        width: 100% !important; /* Всі великі кнопки на всю ширину */
        padding: 12px !important;
    }
}
      
.attackBorder.healer-target { outline: 3px solid #4CAF50 !important; }
.attackBorder.healer-target:hover::after { content: '➕' !important; }

        /* Покращена сітка форми юніта */
.unit-form { 
    border: 1px solid #eee; 
    padding: 15px; 
    margin: 15px 0; 
    border-radius: 10px; 
    display: grid; 
    /* Фіксуємо 4 колонки на ПК для стабільності, або auto-fit */
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
    gap: 12px; 
    background: #fafafa; 
}

.unit-form div {
    display: flex;
    flex-direction: column;
}

.unit-form input[type="text"], 
.unit-form input[type="number"] {
    width: 100%;
    height: 35px;
    padding: 5px 8px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 4px;
}

/* Спеціальний стиль для блоку з галочкою */
.healer-field {
    display: flex;
    flex-direction: column;
    align-items: center; /* Центруємо галочку під написом */
    justify-content: center;
    background: #e8f5e9; /* Легкий зелений фон для виділення */
    border-radius: 6px;
    padding: 5px;
    border: 1px solid #c8e6c9;
}

.healer-field input[type="checkbox"] {
    width: 20px;
    height: 20px;
    margin-top: 5px;
    cursor: pointer;
}

.healer-field small {
    color: #2e7d32;
    font-weight: bold;
}

/* Мобільна адаптація редактора */
@media (max-width: 900px) {
    .unit-form {
        grid-template-columns: 1fr 1fr !important; /* 2 колонки на мобільних */
    }
}
    </style>
</head>
<body>

<div id="tabs">
    <button class="tab-btn active" onclick="switchTab('game')">🎮 Гра</button>
    <img src="https://raw.githubusercontent.com/zabuzos/biluga2/refs/heads/main/img/logo-biluga.png" class="game-logo-pc" alt="Biluga 3">
    <button class="tab-btn" onclick="switchTab('editor')">🛠️ Редактор</button>
</div>

<div id="gameView" class="view active">
    <div id="menu">
        <input type="text" id="roomInput" placeholder="Назва кімнати" />
        <select id="playerSelect"><option value="1">Гравець 1 (Синій)</option><option value="2">Гравець 2 (Червоний)</option></select>
        <select id="raceSelect"></select>
        <button id="joinBtn" style="padding: 10px 20px; background: #2196F3; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Увійти</button>
    </div>

    <div class="game-layout">
        <div class="panel" id="leftPanel"></div>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div id="turnPanel" class="card" style="text-align: center; width: 100%; max-width: 400px;">
                <h3 style="margin: 0 0 10px 0;">Хід: <span id="turn">1</span> | Гравець: <span id="player">1</span></h3>
                <div style="display: flex; justify-content: space-around; font-size: 1.1em;">
                    <span style="color: #2196F3;">💰 P1: <b id="money1">0</b></span>
                    <span style="color: #f44336;">💰 P2: <b id="money2">0</b></span>
                </div>
            </div>
            <div id="gridWrapper"><div id="grid"></div></div>
            <div style="margin-top: 15px; display: flex; gap: 10px; width: 100%; justify-content: center;">
                <button onclick="endTurn()" class="buyBtn" id="endTurnBtn" style="width: 180px;">Завершити хід</button>
                <button onclick="resetState()" style="background: #ef6c00; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold;">Нова гра</button>
            </div>
        </div>
        <div class="panel" id="rightPanel"></div>
    </div>
</div>

<div id="editorView" class="view">
    <div class="race-editor">
        <div style="background: #e3f2fd; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center;">
            <strong>🔑 Ключ синхронізації:</strong>
            <input type="text" id="syncKey" placeholder="Ваш ключ..." style="width: 200px;">
            <button onclick="loadCloudRaces()" style="background: #2196F3; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Завантажити</button>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Управління комплектами рас</h2>
            <button onclick="addNewRace()" style="background: #4CAF50; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer;">+ Нова раса</button>
        </div>
        <div id="racesList"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBM6L4pO6cCkCX6mhChNG0-5RxKYOIV1fY",
    authDomain: "beluga-a7197.firebaseapp.com",
    databaseURL: "https://beluga-a7197-default-rtdb.firebaseio.com",
    projectId: "beluga-a7197",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Стан гри
let state = { units: [], money: {1: 500000, 2: 500000}, cities: [], obstacles: [], playerRaces: { 1: null, 2: null } };
let currentPlayer = 1, playerId = 1, turn = 1, room = "", selectedUnit = null, buyMode = null;

const defaultRace = {
    name: "Людство",
    units: [{id: 'd1', name:"Піхота", speed:3, atk:20, hp:50, range:1, price:40000, img:"https://cdn-icons-png.flaticon.com/512/1054/1054363.png"}]
};

let myRaces = [defaultRace];
let currentSyncKey = localStorage.getItem('familySyncKey') || "";
if(currentSyncKey) document.getElementById('syncKey').value = currentSyncKey;

// --- ФУНКЦІЇ РЕДАКТОРА (WINDOW ДЛЯ ДОСТУПУ З HTML) ---

window.renderEditor = () => {
    const list = document.getElementById('racesList');
    if(!list) return;
    list.innerHTML = myRaces.map((race, rIdx) => `
        <div class="card" style="border-top: 5px solid #2196F3; margin-bottom: 30px; border-left: 1px solid #ddd; border-right: 1px solid #ddd;">
            <div style="display:flex; justify-content:space-between; align-items:center; background: #f8f9fa; padding: 10px; border-radius: 8px 8px 0 0; margin: -12px -12px 15px -12px; border-bottom: 1px solid #eee;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 1.2em;">📦</span>
                    <input type="text" value="${race.name}" 
                        style="font-weight: bold; font-size: 1.1em; border: 1px solid transparent; background: transparent; padding: 5px; width: 250px;"
                        onchange="window.updateRaceName(${rIdx}, this.value)">
                </div>
                <button class="delete-btn" onclick="window.deleteRace(${rIdx})">Видалити расу</button>
            </div>
            ${(race.units || []).map((unit, uIdx) => `
                <div class="unit-form">
                    <div><small>Назва</small><input type="text" value="${unit.name}" onchange="window.updateUnit(${rIdx}, ${uIdx}, 'name', this.value)"></div>
                    <div><small>❤️ HP</small><input type="number" value="${unit.hp}" onchange="window.updateUnit(${rIdx}, ${uIdx}, 'hp', this.value)"></div>
                    <div><small>⚔️ Атака</small><input type="number" value="${unit.atk}" onchange="window.updateUnit(${rIdx}, ${uIdx}, 'atk', this.value)"></div>
                    <div><small>🏃 Шв</small><input type="number" value="${unit.speed}" onchange="window.updateUnit(${rIdx}, ${uIdx}, 'speed', this.value)"></div>
                    <div><small>🎯 Дальн</small><input type="number" value="${unit.range}" onchange="window.updateUnit(${rIdx}, ${uIdx}, 'range', this.value)"></div>
                    <div><small>💰 Ціна</small><input type="number" value="${unit.price}" onchange="window.updateUnit(${rIdx}, ${uIdx}, 'price', this.value)"></div>
                    <div class="healer-field">
                        <small>➕ Цілитель</small>
                        <input type="checkbox" ${unit.isHealer ? 'checked' : ''} onchange="window.updateUnit(${rIdx}, ${uIdx}, 'isHealer', this.checked)">
                    </div>
                    <div style="grid-column: span 2;"><small>🖼️ Картинка</small><input type="text" value="${unit.img}" onchange="window.updateUnit(${rIdx}, ${uIdx}, 'img', this.value)" style="width: 100%;"></div>
                    <div style="display: flex; align-items: flex-end;">
                        <button class="delete-btn" onclick="window.deleteUnit(${rIdx}, ${uIdx})" style="width: 100%; height: 35px;">🗑️</button>
                    </div>
                </div>
            `).join('')}
            <button onclick="window.addUnitToRace(${rIdx})" style="width:100%; padding:10px; background:#e3f2fd; color:#2196F3; border:1px dashed #2196F3; border-radius:8px; cursor:pointer; font-weight:bold;">+ Додати воїна</button>
        </div>
    `).join('');
};

window.updateRaceName = (rI, val) => { myRaces[rI].name = val; window.saveRacesToCloud(); };
window.updateUnit = (rI, uI, f, v) => { 
    myRaces[rI].units[uI][f] = (f === 'isHealer') ? v : ((f==='name'||f==='img') ? v : Number(v)); 
    window.saveRacesToCloud(); 
};
window.deleteRace = (i) => { if(confirm("Видалити расу?")) { myRaces.splice(i, 1); window.saveRacesToCloud(); } };
window.deleteUnit = (rI, uI) => { myRaces[rI].units.splice(uI, 1); window.saveRacesToCloud(); };
window.addUnitToRace = (rI) => {
    if(!myRaces[rI].units) myRaces[rI].units = [];
    myRaces[rI].units.push({ id: 'u'+Date.now(), name: "Новий воїн", speed: 2, atk: 10, hp: 40, range: 1, price: 30000, img: "https://cdn-icons-png.flaticon.com/512/2042/2042878.png" });
    window.saveRacesToCloud();
};
window.addNewRace = () => { let n = prompt("Назва раси:"); if(n) { myRaces.push({name:n, units:[]}); window.saveRacesToCloud(); } };

window.saveRacesToCloud = () => {
    if(currentSyncKey) set(ref(db, 'cloud_races/' + currentSyncKey), myRaces);
    window.renderEditor();
    updateRaceSelect();
};

window.loadCloudRaces = () => {
    const key = document.getElementById('syncKey').value.trim();
    if(!key) return alert("Введіть ключ!");
    currentSyncKey = key;
    localStorage.setItem('familySyncKey', key);
    onValue(ref(db, 'cloud_races/' + key), (snap) => {
        if(snap.exists()) myRaces = snap.val();
        window.renderEditor(); updateRaceSelect();
    });
};

// --- ГРАФІКА ТА ГЕНЕРАЦІЯ ---

function generateRandomCities() {
    return [{x: Math.floor(Math.random()*2), y: Math.floor(Math.random()*4)}, {x: Math.floor(Math.random()*2), y: 6+Math.floor(Math.random()*4)},
            {x: 16+Math.floor(Math.random()*2), y: Math.floor(Math.random()*4)}, {x: 16+Math.floor(Math.random()*2), y: 6+Math.floor(Math.random()*4)}];
}

function generateLevelData() {
    const cities = generateRandomCities();
    const obstacles = [];
    for (let y = 0; y < 10; y++) {
        for (let x = 0; x < 18; x++) {
            if (cities.some(c => c.x === x && c.y === y)) continue;
            let rand = Math.random();
            if (rand < 0.1) obstacles.push({x, y, type: 'water'});
            else if (rand < 0.18) obstacles.push({x, y, type: 'mountain'});
        }
    }
    return { cities, obstacles };
}

// --- ІГРОВА ЛОГІКА ---

window.switchTab = (tab) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + 'View').classList.add('active');
};

function updateRaceSelect() {
    const sel = document.getElementById('raceSelect');
    if(sel) sel.innerHTML = myRaces.map((r, i) => `<option value="${i}">${r.name}</option>`).join('');
}

function createGrid() {
    let g = document.getElementById('grid'); g.innerHTML = '';
    for(let y=0; y<10; y++) {
        for(let x=0; x<18; x++) {
            let d = document.createElement('div'); d.className = 'cell';
            if(x === 8) d.classList.add('divider');
            d.dataset.x = x; d.dataset.y = y; d.onclick = () => cellClick(x, y);
            g.appendChild(d);
        }
    }
}

function render() {
    if(!state) return;
    document.getElementById('turn').innerText = turn;
    document.getElementById('player').innerText = currentPlayer;
    document.getElementById('money1').innerText = (state.money[1]/1000) + 'к';
    document.getElementById('money2').innerText = (state.money[2]/1000) + 'к';
    document.getElementById('endTurnBtn').disabled = (currentPlayer !== playerId);
    
    document.querySelectorAll('.cell').forEach(c => { 
        c.innerHTML = ''; 
        c.classList.remove('move','selected','attackBorder', 'healer-target');
        c.style.backgroundColor = '';
        c.style.backgroundImage = "url('img/ground.png')";
    });

    (state.obstacles || []).forEach(ob => {
        let cell = document.querySelector(`.cell[data-x='${ob.x}'][data-y='${ob.y}']`);
        if (!cell) return;
        if (ob.type === 'water') { cell.style.backgroundColor = '#128cc3'; cell.style.backgroundImage = 'none'; }
        else { cell.style.backgroundColor = 'rgba(121,85,72,0.5)'; cell.innerHTML = '⛰️'; cell.style.backgroundImage = 'none'; }
    });

    (state.cities || []).forEach(c => {
        let cell = document.querySelector(`.cell[data-x='${c.x}'][data-y='${c.y}']`);
        if(cell) cell.innerHTML = '<span style="font-size:24px; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);">🏰</span>';
    });

    (state.units || []).forEach(u => {
        let cell = document.querySelector(`.cell[data-x='${u.x}'][data-y='${u.y}']`);
        if(!cell) return;
        let img = document.createElement('img'); img.src = u.img; img.className = `unitImg ${u.owner === 1 ? 'unitP1' : 'unitP2'}`;
        cell.appendChild(img);
        let h = document.createElement('div'); h.className = 'hp'; h.innerText = u.hp; cell.appendChild(h);
        let m = document.createElement('div'); m.className = 'mp'; m.innerText = u.movePoints; cell.appendChild(m);
        if(selectedUnit && u.x === selectedUnit.x && u.y === selectedUnit.y) cell.classList.add('selected');
    });
    if(selectedUnit) { highlightMoves(selectedUnit); highlightAttacks(selectedUnit); }
    renderShop();
}

function renderShop() {
    const lP = document.getElementById('leftPanel'); 
    const rP = document.getElementById('rightPanel');
    const p1R = (state.playerRaces && state.playerRaces[1]) ? state.playerRaces[1] : defaultRace;
    const p2R = (state.playerRaces && state.playerRaces[2]) ? state.playerRaces[2] : defaultRace;

    let buildShop = (race, pNum) => {
        let html = `<div style="text-align:center; padding:8px; background:${pNum===1?'#2196F3':'#f44336'}; color:white; border-radius:8px; margin-bottom:10px;"><b>${race.name}</b></div>`;
        (race.units || []).forEach(u => {
            html += `
                <div class="card shopCard">
                    <div class="unit-preview">
                        <div class="stats-overlay">${u.isHealer ? '➕' : '⚔️'}${u.atk} ❤️${u.hp} 🏃${u.speed}</div>
                        <img src="${u.img}" class="shopImg">
                        <div class="name-overlay">${u.name}</div>
                    </div>
                    <button class="buyBtn" onclick="window.startBuy('${u.id}')" ${currentPlayer !== pNum || playerId !== pNum ? 'disabled' : ''}>${u.price/1000}к 💰</button>
                </div>`;
        });
        return html;
    };
    lP.innerHTML = buildShop(p1R, 1); rP.innerHTML = buildShop(p2R, 2);
}

window.startBuy = (id) => { buyMode = id; };

function cellClick(x, y) {
    if(currentPlayer !== playerId) return;
    let unitAtCell = state.units.find(u => u.x === x && u.y === y);

    if(buyMode) {
        if(unitAtCell || (state.obstacles || []).some(o => o.x === x && o.y === y) || (playerId === 1 ? x > 8 : x < 9)) return;
        const myR = (state.playerRaces && state.playerRaces[playerId]) ? state.playerRaces[playerId] : defaultRace;
        const uD = myR.units.find(u => u.id === buyMode);
        if(uD && state.money[playerId] >= uD.price) {
            state.money[playerId] -= uD.price;
            state.units.push({...uD, x, y, owner: playerId, movePoints: 0, attacked: true, maxHp: Number(uD.hp)});
            buyMode = null; saveState(); render();
        }
        return;
    }

    if(selectedUnit && unitAtCell && !selectedUnit.attacked) {
        let dist = Math.max(Math.abs(selectedUnit.x - x), Math.abs(selectedUnit.y - y));
        if(dist <= selectedUnit.range && dist > 0) {
            if(selectedUnit.isHealer && unitAtCell.owner === playerId) {
                let max = Number(unitAtCell.maxHp || unitAtCell.hp);
                if(unitAtCell.hp < max) {
                    unitAtCell.hp = Math.min(max, Number(unitAtCell.hp) + Number(selectedUnit.atk));
                    selectedUnit.attacked = true;
                    saveState(); render(); return;
                }
            } else if(!selectedUnit.isHealer && unitAtCell.owner !== playerId) {
                unitAtCell.hp -= selectedUnit.atk;
                selectedUnit.attacked = true;
                if(unitAtCell.hp <= 0) state.units = state.units.filter(u => u !== unitAtCell);
                saveState(); render(); return;
            }
        }
    }

    if(unitAtCell && unitAtCell.owner === playerId) { selectedUnit = unitAtCell; render(); return; }
    
    if(selectedUnit && selectedUnit.movePoints > 0 && !unitAtCell) {
        let d = Math.max(Math.abs(selectedUnit.x-x), Math.abs(selectedUnit.y-y));
        if(d <= selectedUnit.movePoints && !(state.obstacles || []).some(o => o.x === x && o.y === y)) {
            selectedUnit.x = x; selectedUnit.y = y; selectedUnit.movePoints -= d;
            saveState(); render();
        }
    }
}

function highlightMoves(u) {
    if(!u || u.movePoints <= 0) return;
    document.querySelectorAll('.cell').forEach(c => {
        let x = parseInt(c.dataset.x), y = parseInt(c.dataset.y);
        let d = Math.max(Math.abs(u.x-x), Math.abs(u.y-y));
        if(d > 0 && d <= u.movePoints && !state.units.some(un => un.x===x && un.y===y) && !state.obstacles.some(o => o.x===x && o.y===y)) {
            c.classList.add('move');
        }
    });
}

function highlightAttacks(u) {
    if(!u || u.attacked) return;
    state.units.forEach(e => {
        let d = Math.max(Math.abs(u.x-e.x), Math.abs(u.y-e.y));
        if(d > 0 && d <= u.range) {
            let c = document.querySelector(`.cell[data-x='${e.x}'][data-y='${e.y}']`);
            if(u.isHealer && e.owner === u.owner) c.classList.add('attackBorder', 'healer-target');
            else if(!u.isHealer && e.owner !== u.owner) c.classList.add('attackBorder');
        }
    });
}

window.endTurn = () => {
    state.money[currentPlayer] += 100000;
    currentPlayer = (currentPlayer === 1) ? 2 : 1;
    if (currentPlayer === 1) turn++;
    state.units.forEach(u => { if(u.owner === currentPlayer) { u.movePoints = u.speed; u.attacked = false; }});
    selectedUnit = null; saveState();
};

window.saveState = () => { if(room) set(ref(db, 'games/'+room), {state, turn, currentPlayer}); };
window.resetState = () => {
    const level = generateLevelData();
    state = { units: [], money: {1: 500000, 2: 500000}, cities: level.cities, obstacles: level.obstacles, playerRaces: state.playerRaces };
    turn = 1; currentPlayer = 1; saveState();
};

document.getElementById('joinBtn').onclick = () => {
    room = document.getElementById('roomInput').value.trim();
    if(!room) return alert("Введіть назву кімнати");
    playerId = parseInt(document.getElementById('playerSelect').value);
    const raceIdx = document.getElementById('raceSelect').value;
    const selectedRaceData = JSON.parse(JSON.stringify(myRaces[raceIdx]));
    
    get(ref(db, 'games/'+room)).then(snap => {
        if(!snap.exists()) {
            const level = generateLevelData();
            state = { units: [], money: {1: 500000, 2: 500000}, cities: level.cities, obstacles: level.obstacles, playerRaces: { 1: null, 2: null } };
        } else {
            state = snap.val().state;
        }
        state.playerRaces[playerId] = selectedRaceData;
        saveState();
        onValue(ref(db, 'games/'+room), (s) => {
            let d = s.val(); if(d) { state = d.state; turn = d.turn; currentPlayer = d.currentPlayer; render(); }
        });
    });
};

createGrid();
if(currentSyncKey) window.loadCloudRaces();
window.renderEditor();
updateRaceSelect();
render();

</script>
</body>
</html>
